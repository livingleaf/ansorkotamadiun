<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Kerja GP Ansor</title>
    <link rel="stylesheet" href="./Proker.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- NAVBAR -->
    <!-- PAGE 1: TIMELINE -->


    <!-- PAGE 2: DETAILS -->
    <div class="story-page page2" id="page2">
        <div class="header">
            <div class="logo-placeholder" onclick="goHome()" style="cursor: pointer;">
                <img src="https://upload.wikimedia.org/wikipedia/id/thumb/7/70/Logo_GP_Ansor.png/250px-Logo_GP_Ansor.png" alt="Logo GP Ansor">
            </div>
            <h1>Detail Program</h1>
            <p>Rincian Lengkap Kegiatan</p>
        </div>

        <div class="tab-container">
            <button class="tab-button active" onclick="filterActivities('semua', event)">Semua</button>
            <button class="tab-button" onclick="filterActivities('terlaksana', event)">Terlaksana</button>
            <button class="tab-button" onclick="filterActivities('wacana', event)">Wacana</button>
        </div>

        <div class="detail-grid" id="detail-list">
            <!-- detail-list will be rendered here -->
        </div>
        <div class="footer-note">
            © 2025 GP Ansor Kota Madiun
        </div>
        <div></div>
    </div>

    <!-- FOOTER -->

    <script src="./proker.js"></script>
    <script>
    // Master data list (editable)
    let currentDetailPage = 1;
    const itemsPerPage = 5;

    // Parse waktu string to get first date for sorting
    function parseWaktuDate(waktuStr) {
        if (!waktuStr) return new Date(9999, 0, 0);
        // Try to extract date in format "DD Mon YYYY" or similar
        const matches = waktuStr.match(/(\d{1,2})\s+(\w+)\s+(\d{4})/);
        if (matches) {
            const monthMap = { 'jan': 0, 'peb': 1, 'feb': 1, 'maret': 2, 'mar': 2, 'april': 3, 'apr': 3, 'mei': 4, 'may': 4, 'juni': 5, 'jun': 5, 'juli': 6, 'jul': 6, 'agustus': 7, 'agu': 7, 'sept': 8, 'sep': 8, 'oktober': 9, 'okt': 9, 'november': 10, 'nov': 10, 'desember': 11, 'des': 11 };
            const day = parseInt(matches[1]);
            const month = monthMap[matches[2].toLowerCase()] || 0;
            const year = parseInt(matches[3]);
            return new Date(year, month, day);
        }
        return new Date(9999, 0, 0);
    }

    // Render timeline on Program Kerja page (only necessary fields shown)
    function renderTimeline() {
        const container = document.getElementById('timeline-list');
        if (!container) return;

        // Sort activities by date before rendering
        const sortedActivities = getSortedActivities('semua');
        container.innerHTML = '';

        sortedActivities.forEach(act => {
            const item = document.createElement('div');
            item.className = 'timeline-item';
            item.innerHTML = `
                <div class="timeline-dot"></div>
                <div class="item-header">
                    <div class="item-number">${act.id}</div>
                    <div class="item-content">
                        <div class="item-title">${escapeHtml(act.judul)}</div>
                        <div class="item-meta">
                            <span class="meta-badge time-badge">📅 ${escapeHtml(act.waktu)}</span>
                            <span class="meta-badge pj-badge">👥 ${escapeHtml(act.pj)}</span>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(item);
        });
    }

    // Create detail card HTML
    function createDetailCard(act) {
        const pjText = (act.pj || '').toLowerCase();
        const flags = [];

        if (pjText.includes('banser')) {
            flags.push({ cls: 'pj-flag-banser', txt: 'Banser' });
        }
        if (pjText.includes('mdsra') || pjText.includes('mdra') || pjText.includes('mds ra') || pjText.includes('md ra')) {
            flags.push({ cls: 'pj-flag-mdsra', txt: 'MDSRA' });
        }
        if (pjText.includes('badan siber') || pjText.includes('bsa') || pjText.includes('badan siber ansor')) {
            flags.push({ cls: 'pj-flag-bsa', txt: 'Siber' });
        }
        if (pjText.includes('kader') || pjText.includes('kaderisasi')) {
            flags.push({ cls: 'pj-flag-kader', txt: 'Kaderisasi' });
        }

        const pjFlagsHtml = flags.length
            ? `<div class="pj-flags">${flags.map(f => `<div class="pj-flag ${f.cls}">${escapeHtml(f.txt)}</div>`).join('')}</div>`
            : '';

        const card = document.createElement('div');
        card.className = 'detail-card';
        card.setAttribute('data-status', act.status);
        card.innerHTML = `
            <div class="card-header">
                <div class="card-number">${act.id}</div>
                <div class="card-title">
                    <h3>${escapeHtml(act.judul)}</h3>
                    <p>${escapeHtml(act.kegiatan)}</p>
                </div>
                ${pjFlagsHtml}
            </div>
            <div class="card-content">
                <div class="info-row">
                    <div class="info-label">PJ</div>
                    <div class="info-value">: ${escapeHtml(act.pj)}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Waktu</div>
                    <div class="info-value">: ${escapeHtml(act.waktu)}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Keterangan</div>
                    <div class="info-value">: ${escapeHtml(act.keterangan || '-')}</div>
                </div>
                <div>
                    <span class="status-badge ${act.status === 'terlaksana' ? 'status-completed' : 'status-pending'}">
                        ${act.status === 'terlaksana' ? '✓ Terlaksana' : '⏳ Belum'}
                    </span>
                </div>
            </div>
        `;
        return card;
    }

    // Get filtered and sorted activities
    function getSortedActivities(filterStatus = 'semua') {
        let filtered = activities;

        if (filterStatus !== 'semua') {
            filtered = activities.filter(a => a.status === filterStatus);
        }

        // Sort by date (nearest first)
        return filtered.sort((a, b) => {
            const dateA = parseWaktuDate(a.waktu);
            const dateB = parseWaktuDate(b.waktu);
            return dateA - dateB;
        });
    }

    // Render detail cards with pagination
    function renderDetails(filterStatus = 'semua') {
        const container = document.getElementById('detail-list');
        if (!container) return;
        container.innerHTML = '';

        currentDetailPage = 1;
        const sortedActivities = getSortedActivities(filterStatus);

        // Initial render is just showing page 1
        showDetailPage(1, filterStatus);

        // Add pagination if there are more items
        // Note: The pagination logic is now fully inside showDetailPage
        // We only need to call it. But to avoid duplicating pagination container creation,
        // let's move all rendering logic into showDetailPage.
        if (sortedActivities.length > itemsPerPage) {
            const paginationContainer = document.createElement('div');
            paginationContainer.className = 'pagination-container';
            // The rest of pagination is handled by showDetailPage

            const totalPages = Math.ceil((sorted.length - 5) / itemsPerPage) + 1;

            // Prev button
            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn';
            prevBtn.textContent = '← Sebelumnya';
            prevBtn.onclick = () => showDetailPage(currentDetailPage - 1, filterStatus);
            prevBtn.style.opacity = currentDetailPage === 1 ? '0.5' : '1';
            prevBtn.style.cursor = currentDetailPage === 1 ? 'default' : 'pointer';
            prevBtn.disabled = currentDetailPage === 1;
            paginationContainer.appendChild(prevBtn);

            // Page info
            const pageInfo = document.createElement('span');
            pageInfo.style.margin = '0 20px';
            pageInfo.textContent = `Halaman ${currentDetailPage} dari ${totalPages}`;
            paginationContainer.appendChild(pageInfo);

            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-btn';
            nextBtn.textContent = 'Selanjutnya →';
            nextBtn.onclick = () => showDetailPage(currentDetailPage + 1, filterStatus);
            nextBtn.style.opacity = currentDetailPage === totalPages ? '0.5' : '1';
            nextBtn.style.cursor = currentDetailPage === totalPages ? 'default' : 'pointer';
            nextBtn.disabled = currentDetailPage === totalPages;
            paginationContainer.appendChild(nextBtn);

            container.appendChild(paginationContainer);
        }
    }

    // Show specific page of details
    function showDetailPage(page, filterStatus = 'semua') {
        const container = document.getElementById('detail-list');
        if (!container) return;
        container.innerHTML = '';

        const sortedActivities = getSortedActivities(filterStatus);
        const totalPages = Math.ceil(sortedActivities.length / itemsPerPage);

        if (page < 1 || page > totalPages) return;

        currentDetailPage = page;

        const startIdx = (page - 1) * itemsPerPage;
        const endIdx = startIdx + itemsPerPage;
        const pageItems = sortedActivities.slice(startIdx, endIdx);
        pageItems.forEach(act => {
            container.appendChild(createDetailCard(act));
        });

        // Add pagination buttons
        const paginationContainer = document.createElement('div');
        paginationContainer.className = 'pagination-container';
        paginationContainer.style.marginTop = '30px';
        paginationContainer.style.textAlign = 'center';

        // Prev button
        const prevBtn = document.createElement('button');
        prevBtn.className = 'pagination-btn';
        prevBtn.textContent = '← Sebelumnya';
        prevBtn.onclick = () => showDetailPage(page - 1, filterStatus);
        prevBtn.style.opacity = page === 1 ? '0.5' : '1';
        prevBtn.style.cursor = page === 1 ? 'default' : 'pointer';
        prevBtn.disabled = page === 1;
        paginationContainer.appendChild(prevBtn);

        // Page info
        const pageInfo = document.createElement('span');
        pageInfo.style.margin = '0 20px';
        pageInfo.textContent = `Halaman ${page} dari ${totalPages}`;
        paginationContainer.appendChild(pageInfo);

        // Next button
        const nextBtn = document.createElement('button');
        nextBtn.className = 'pagination-btn';
        nextBtn.textContent = 'Selanjutnya →';
        nextBtn.onclick = () => showDetailPage(page + 1, filterStatus);
        nextBtn.style.opacity = page === totalPages ? '0.5' : '1';
        nextBtn.style.cursor = page === totalPages ? 'default' : 'pointer';
        nextBtn.disabled = page === totalPages;
        paginationContainer.appendChild(nextBtn);

        container.appendChild(paginationContainer);
    }

    // Utility: simple escape to avoid injecting markup from data
    function escapeHtml(str) {
        if (!str && str !== 0) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // Filter details by status and update active tab
    function filterActivities(filter, ev) {
        const buttons = document.querySelectorAll('.tab-button');

        buttons.forEach(btn => btn.classList.remove('active'));

        if (ev && ev.currentTarget) {
            ev.currentTarget.classList.add('active');
        } else if (ev && ev.target) {
            ev.target.classList.add('active');
        } else {
            // fallback: find button by filter
            const btn = Array.from(buttons).find(b => b.textContent.trim().toLowerCase() === (filter || '').toLowerCase());
            if (btn) btn.classList.add('active');
        }

        // Re-render with new filter and reset to page 1
        renderDetails(filter);
    }

    // Navigate back to home/previous page
    function goHome() {
        // Redirect to parent directory index.html
        window.location.href = '../index.html';
    }

    // Initialize rendering
    renderTimeline();
    renderDetails();

    // Navbar scroll effect
    window.addEventListener('scroll', function() {
        const navbar = document.querySelector('.navbar');
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });

    </script>

</body>
</html>
