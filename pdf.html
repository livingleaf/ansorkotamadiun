<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .converter-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.4);
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .drop-zone svg {
            width: 64px;
            height: 64px;
            fill: var(--primary);
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        .drop-zone:hover svg {
            transform: translateY(-5px);
        }

        .drop-zone-text {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .drop-zone-subtext {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .preview-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.5s ease;
            group: preview;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .preview-item:hover img {
            transform: scale(1.05);
        }

        .remove-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease;
            font-size: 12px;
        }

        .preview-item:hover .remove-btn {
            opacity: 1;
        }

        .actions {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.7;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: none;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Loading overlay */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loader-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <h3 id="loader-text">Generating PDF...</h3>
    </div>

    <div class="container">
        <header>
            <h1>Image to PDF</h1>
            <p>Seamlessly merge your images into a single PDF file</p>
        </header>

        <main class="converter-card">
            <div class="drop-zone" id="drop-zone">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z" />
                </svg>
                <div class="drop-zone-text">Drag & drop images here</div>
                <div class="drop-zone-subtext">or click to browse files (JPG, PNG, WebP)</div>
                <input type="file" id="file-input" multiple accept="image/jpeg, image/png, image/webp">
            </div>

            <div class="preview-container" id="preview-container">
                <!-- Preview images will go here -->
            </div>

            <div class="actions">
                <button class="btn btn-secondary" id="clear-btn" disabled>Clear All</button>
                <button class="btn" id="convert-btn" disabled>
                    <svg style="width:20px;height:20px;fill:white;" viewBox="0 0 24 24">
                        <path
                            d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z" />
                    </svg>
                    Convert to PDF
                </button>
            </div>
        </main>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const clearBtn = document.getElementById('clear-btn');
        const convertBtn = document.getElementById('convert-btn');
        const loader = document.getElementById('loader');

        let selectedFiles = [];

        // Handle Drag and Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        // Handle File Input
        fileInput.addEventListener('change', function (e) {
            handleFiles(this.files);
            // Reset input so same files can be selected again if needed
            this.value = '';
        });

        function handleFiles(files) {
            const newFiles = Array.from(files).filter(file => file.type.startsWith('image/'));

            newFiles.forEach(file => {
                // Prevent duplicates based on name and size
                if (!selectedFiles.some(f => f.file.name === file.name && f.file.size === file.size)) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const id = Date.now().toString(36) + Math.random().toString(36).substr(2);
                        const fileObj = { id, file, dataUrl: e.target.result };
                        selectedFiles.push(fileObj);
                        renderPreview(fileObj);
                        updateUI();
                    }
                }
            });
        }

        function renderPreview(fileObj) {
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.dataset.id = fileObj.id;

            div.innerHTML = `
                <img src="${fileObj.dataUrl}" alt="preview">
                <button class="remove-btn" onclick="removeFile('${fileObj.id}')">✕</button>
            `;

            previewContainer.appendChild(div);
        }

        window.removeFile = function (id) {
            selectedFiles = selectedFiles.filter(f => f.id !== id);
            const item = document.querySelector(`.preview-item[data-id="${id}"]`);
            if (item) {
                item.style.transform = 'scale(0)';
                item.style.opacity = '0';
                setTimeout(() => {
                    item.remove();
                    updateUI();
                }, 300);
            } else {
                updateUI();
            }
        }

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            previewContainer.innerHTML = '';
            updateUI();
        });

        function updateUI() {
            const hasFiles = selectedFiles.length > 0;
            clearBtn.disabled = !hasFiles;
            convertBtn.disabled = !hasFiles;
        }

        // Conversion logic
        convertBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            loader.classList.add('active');

            try {
                // Ensure jsPDF is loaded
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();

                for (let i = 0; i < selectedFiles.length; i++) {
                    const imgData = selectedFiles[i].dataUrl;

                    // Create an image element to get dimensions
                    const img = new Image();
                    img.src = imgData;
                    await new Promise(resolve => img.onload = resolve);

                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();

                    const imgRatio = img.width / img.height;
                    const pdfRatio = pdfWidth / pdfHeight;

                    let drawWidth, drawHeight;

                    // Fit image within PDF page while maintaining aspect ratio
                    if (imgRatio > pdfRatio) {
                        drawWidth = pdfWidth - 20; // 10px margin
                        drawHeight = (drawWidth / imgRatio);
                    } else {
                        drawHeight = pdfHeight - 20;
                        drawWidth = (drawHeight * imgRatio);
                    }

                    // Center the image
                    const x = (pdfWidth - drawWidth) / 2;
                    const y = (pdfHeight - drawHeight) / 2;

                    if (i > 0) {
                        pdf.addPage();
                    }

                    pdf.addImage(imgData, 'JPEG', x, y, drawWidth, drawHeight);
                }

                pdf.save('merged-images.pdf');

            } catch (error) {
                console.error("Error generating PDF:", error);
                alert("An error occurred while generating the PDF.");
            } finally {
                loader.classList.remove('active');
            }
        });

    </script>
</body>

</html>
